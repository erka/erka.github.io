---
layout: default
---
<div class="post container">
<div class="row">
  <header class="post-header">
    <h1 class="post-title header">{{ page.title }}</h1>
    <p class="post-meta badge">{{ page.date | date: "%b %-d, %Y" }}</p>
  </header>

  <article class="post-content s12">
    {{ content }}
  </article>
</div>
</div>
